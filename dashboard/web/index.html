<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Dashboard</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --yellow: #d29922;
  --red: #f85149;
  --orange: #d4761a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 16px;
  min-height: 100vh;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 8px;
}
.header h1 {
  font-size: 1.5rem;
  color: var(--accent);
}
.header-info {
  font-size: 0.8rem;
  color: var(--muted);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 16px;
  margin-bottom: 16px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.card h2 {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 12px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 0.9rem;
}
.stat-row .label { color: var(--muted); }
.stat-row .value { font-weight: 600; }
.bar-bg {
  background: var(--border);
  border-radius: 4px;
  height: 8px;
  overflow: hidden;
  margin: 8px 0;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}
.table-wrap {
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
th {
  text-align: left;
  color: var(--muted);
  font-weight: 500;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 4px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.pill {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
}
.pill-running { background: #1a3a2a; color: var(--green); }
.pill-sleeping { background: #1a2d3a; color: var(--accent); }
.pill-stopped { background: #3a1a1a; color: var(--red); }
.pill-zombie { background: #3a2a1a; color: var(--orange); }
.error-state {
  color: var(--muted);
  font-size: 0.85rem;
  padding: 12px 0;
  text-align: center;
}
@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; }
  body { padding: 8px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>Aurora Dashboard</h1>
  <div class="header-info">
    <span id="device-status">Connecting...</span>
    <span style="margin:0 8px">|</span>
    <span id="refresh-info">auto-refresh</span>
  </div>
</div>

<div class="grid">
  <div class="card" id="card-cpu">
    <h2>CPU</h2>
    <div id="cpu-content"><div class="error-state">Loading...</div></div>
  </div>
  <div class="card" id="card-memory">
    <h2>Memory</h2>
    <div id="memory-content"><div class="error-state">Loading...</div></div>
  </div>
  <div class="card" id="card-storage">
    <h2>Storage</h2>
    <div id="storage-content"><div class="error-state">Loading...</div></div>
  </div>
  <div class="card" id="card-battery">
    <h2>Battery</h2>
    <div id="battery-content"><div class="error-state">Loading...</div></div>
  </div>
  <div class="card" id="card-temperature">
    <h2>Temperature</h2>
    <div id="temperature-content"><div class="error-state">Loading...</div></div>
  </div>
  <div class="card" id="card-network">
    <h2>Network</h2>
    <div id="network-content"><div class="error-state">Loading...</div></div>
  </div>
</div>

<div class="card">
  <h2>Processes (top 100)</h2>
  <div class="table-wrap">
    <table id="processes-table">
      <thead>
        <tr><th>PID</th><th>Name</th><th>State</th><th>CPU%</th><th>Memory</th></tr>
      </thead>
      <tbody id="processes-body">
        <tr><td colspan="5" class="error-state">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const REFRESH_MS = 5000;
let errorCount = 0;

function fmtBytes(kb) {
  if (kb < 1024) return `${kb} KB`;
  const mb = kb / 1024;
  if (mb < 1024) return `${mb.toFixed(1)} MB`;
  return `${(mb / 1024).toFixed(2)} GB`;
}

function barColor(pct) {
  if (pct < 50) return 'var(--green)';
  if (pct < 80) return 'var(--yellow)';
  return 'var(--red)';
}

function statePill(state) {
  const cls = { R: 'pill-running', S: 'pill-sleeping', D: 'pill-sleeping', T: 'pill-stopped', Z: 'pill-zombie' }[state] || '';
  return `<span class="pill ${cls}">${state}</span>`;
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function renderCPU(data) {
  const pct = data.usage_percent;
  document.getElementById('cpu-content').innerHTML = `
    <div class="stat-row"><span class="label">Total</span><span class="value">${pct.toFixed(1)}%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct, 100)}%;background:${barColor(pct)}"></div></div>
    <div class="stat-row"><span class="label">Load Avg</span><span class="value">${data.load_avg.map(v => v.toFixed(2)).join(' / ')}</span></div>
    <div style="margin-top:8px;font-size:0.8rem;color:var(--muted)">${data.cores.length} cores</div>
  `;
}

function renderMemory(data) {
  const pct = data.usage_percent;
  document.getElementById('memory-content').innerHTML = `
    <div class="stat-row"><span class="label">Used</span><span class="value">${fmtBytes(data.used_kb)} / ${fmtBytes(data.total_kb)}</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct, 100)}%;background:${barColor(pct)}"></div></div>
    <div class="stat-row"><span class="label">Available</span><span class="value">${fmtBytes(data.available_kb)}</span></div>
    ${data.swap_total_kb > 0 ? `
    <div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">
      <div class="stat-row"><span class="label">Swap</span><span class="value">${fmtBytes(data.swap_used_kb)} / ${fmtBytes(data.swap_total_kb)}</span></div>
    </div>` : ''}
  `;
}

function renderStorage(data) {
  const mounts = data.mounts.filter(m => m.total_kb > 0);
  if (mounts.length === 0) {
    document.getElementById('storage-content').innerHTML = `<div class="error-state">No storage data</div>`;
    return;
  }
  document.getElementById('storage-content').innerHTML = mounts.map(m => `
    <div style="margin-bottom:8px">
      <div class="stat-row"><span class="label">${m.mount_point}</span><span class="value">${m.usage_percent.toFixed(1)}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(m.usage_percent, 100)}%;background:${barColor(m.usage_percent)}"></div></div>
      <div style="font-size:0.75rem;color:var(--muted)">${fmtBytes(m.used_kb)} / ${fmtBytes(m.total_kb)}</div>
    </div>
  `).join('');
}

function renderBattery(data) {
  if (!data.present) {
    document.getElementById('battery-content').innerHTML = `<div class="error-state">No battery detected</div>`;
    return;
  }
  const cap = data.capacity ?? 0;
  document.getElementById('battery-content').innerHTML = `
    <div class="stat-row"><span class="label">Charge</span><span class="value">${cap}%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${cap}%;background:${barColor(cap)}"></div></div>
    <div class="stat-row"><span class="label">Status</span><span class="value">${data.status || 'Unknown'}</span></div>
    ${data.temperature_c !== null ? `<div class="stat-row"><span class="label">Temp</span><span class="value">${data.temperature_c}°C</span></div>` : ''}
  `;
}

function renderTemperature(data) {
  if (data.zones.length === 0) {
    document.getElementById('temperature-content').innerHTML = `<div class="error-state">No thermal zones</div>`;
    return;
  }
  document.getElementById('temperature-content').innerHTML = data.zones.map(z => `
    <div class="stat-row"><span class="label">${z.name}</span><span class="value">${z.temp_c.toFixed(1)}°C</span></div>
  `).join('');
}

function renderNetwork(data) {
  const ifaces = data.interfaces;
  if (ifaces.length === 0) {
    document.getElementById('network-content').innerHTML = `<div class="error-state">No network interfaces</div>`;
    return;
  }
  const rows = ifaces.map(n => `
    <div class="stat-row"><span class="label">${n.name} ${n.is_up ? '🟢' : '🔴'}</span><span class="value">↓${fmtBytes(n.rx_bytes)} ↑${fmtBytes(n.tx_bytes)}</span></div>
  `).join('');
  // Keep it simple - just show a summary
  const active = ifaces.filter(n => n.is_up);
  if (active.length > 2) {
    document.getElementById('network-content').innerHTML = `
      <div class="stat-row"><span class="label">Active</span><span class="value">${active.length} interface${active.length > 1 ? 's' : ''}</span></div>
    ` + rows;
  } else {
    document.getElementById('network-content').innerHTML = rows;
  }
}

function renderProcesses(data) {
  const tbody = document.getElementById('processes-body');
  if (data.processes.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="error-state">No process data</td></tr>`;
    return;
  }
  tbody.innerHTML = data.processes.slice(0, 100).map(p => `
    <tr>
      <td>${p.pid}</td>
      <td>${p.name}</td>
      <td>${statePill(p.state)}</td>
      <td>${p.cpu_percent.toFixed(1)}</td>
      <td>${fmtBytes(p.mem_kb)}</td>
    </tr>
  `).join('');
}

async function refresh() {
  const statusEl = document.getElementById('device-status');
  try {
    const health = await fetchJSON('/api/health');
    statusEl.textContent = `Online v${health.version}`;
    if (errorCount > 0) errorCount = 0;
  } catch {
    statusEl.textContent = 'Offline';
    errorCount++;
    return;
  }
  const endpoints = [
    ['cpu', renderCPU],
    ['memory', renderMemory],
    ['storage', renderStorage],
    ['battery', renderBattery],
    ['temperature', renderTemperature],
    ['network', renderNetwork],
  ];
  for (const [path, render] of endpoints) {
    try {
      const data = await fetchJSON(`/api/${path}`);
      render(data);
    } catch {
      const el = document.getElementById(`${path}-content`);
      if (el) el.innerHTML = `<div class="error-state">Failed to load</div>`;
    }
  }
  try {
    const procs = await fetchJSON('/api/processes');
    renderProcesses(procs);
  } catch {
    document.getElementById('processes-body').innerHTML = `<tr><td colspan="5" class="error-state">Failed to load</td></tr>`;
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
